<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Postal 💋</title>
  <style>
    :root { --card-w: 360px; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at 20% 20%, #ffe6f1, #ffd1e8 40%, #ffc2df 70%, #ffb3d7);
    }

    /* Fondo de besitos */
    .kiss {
      position: absolute;
      font-size: 22px;
      opacity: .85;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.08));
      user-select: none;
      pointer-events: none;
      animation: floatUp linear forwards;
    }
    @keyframes floatUp {
      from { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: .9; }
      to   { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    .card {
      width: min(var(--card-w), 92vw);
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.55);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 22px 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.12);
      position: relative;
    }

    .title {
      margin: 0 0 10px;
      font-size: 22px;
      text-align: center;
      letter-spacing: .2px;
    }
    .subtitle {
      margin: 0 0 16px;
      text-align: center;
      opacity: .85;
      font-size: 14px;
    }

    .stage {
      position: relative;
      height: 170px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.25));
      border: 1px solid rgba(255,255,255,.5);
      overflow: hidden;
    }

    .buttons {
      position: absolute;
      inset: 0;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,.12);
      transition: transform .12s ease, filter .12s ease;
      position: absolute;
      user-select: none;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.98); }

    #yesBtn {
      left: 20px;
      top: 96px;
      background: linear-gradient(90deg, #ff4d8d, #ff2f78);
      color: white;
    }

    #noBtn {
      left: 190px;
      top: 96px;
      background: rgba(255,255,255,.95);
      color: #ff2f78;
      border: 2px solid rgba(255,47,120,.25);
    }

    .result {
      margin-top: 14px;
      text-align: center;
      font-weight: 700;
      min-height: 24px;
    }

    .hint {
      margin: 6px 0 0;
      text-align: center;
      font-size: 12px;
      opacity: .7;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      border: 1px solid rgba(255,255,255,.6);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Postal 💌</div>

    <h1 class="title">¿Quieres un beso mío? 💋</h1>
    <p class="subtitle">Elige con honestidad… (si es que te dejan 😈)</p>

    <div class="stage" id="stage">
      <div class="buttons">
        <button id="yesBtn">Sí 😘</button>
        <button id="noBtn">No 🙃</button>
      </div>
    </div>

    <div class="result" id="result"></div>
    <p class="hint">Tip: intenta atrapar el “No” con el mouse…</p>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const result = document.getElementById("result");

    // Besitos flotando de fondo
    function spawnKiss() {
      const k = document.createElement("div");
      k.className = "kiss";
      k.textContent = Math.random() < 0.5 ? "💋" : "😘";
      k.style.left = Math.random() * 100 + "vw";
      k.style.bottom = "-30px";
      const dur = 4 + Math.random() * 4; // 4-8s
      k.style.animationDuration = dur + "s";
      k.style.fontSize = (18 + Math.random() * 18) + "px";
      document.body.appendChild(k);
      setTimeout(() => k.remove(), dur * 1000);
    }
    setInterval(spawnKiss, 220);

    // Util: posición aleatoria dentro del stage sin salirse
    function moveNoButton() {
      const rect = stage.getBoundingClientRect();

      // Medidas reales del botón
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;

      // Zona segura (padding visual)
      const padding = 12;

      const maxX = rect.width - bw - padding;
      const maxY = rect.height - bh - padding;

      // Aleatorio
      let x = padding + Math.random() * Math.max(0, maxX - padding);
      let y = padding + Math.random() * Math.max(0, maxY - padding);

      // Evita ponerse encima del "Sí"
      const yesX = yesBtn.offsetLeft, yesY = yesBtn.offsetTop;
      const tooClose = Math.abs(x - yesX) < 90 && Math.abs(y - yesY) < 60;
      if (tooClose) {
        x = Math.min(rect.width - bw - padding, x + 110);
        y = Math.max(padding, y - 40);
      }

      noBtn.style.left = x + "px";
      noBtn.style.top  = y + "px";
      noBtn.style.transform = `rotate(${(Math.random()*12 - 6).toFixed(1)}deg)`;
    }

    // El “No” se escapa con hover, acercamiento y click
    ["mouseenter", "mousemove", "touchstart", "pointerdown"].forEach(evt => {
      noBtn.addEventListener(evt, (e) => {
        moveNoButton();
        popMiniKisses(noBtn);
        e.preventDefault();
      }, { passive: false });
    });

    // También se escapa si el mouse entra al área del stage (modo difícil)
    stage.addEventListener("mousemove", (e) => {
      const rect = noBtn.getBoundingClientRect();
      const dx = e.clientX - (rect.left + rect.width/2);
      const dy = e.clientY - (rect.top + rect.height/2);
      const dist = Math.hypot(dx, dy);

      if (dist < 80) { // si te acercas, huye
        moveNoButton();
      }
    });

    // Besitos explotando al elegir Sí o al intentar No
    function popMiniKisses(anchorEl) {
      const r = anchorEl.getBoundingClientRect();
      for (let i = 0; i < 10; i++) {
        const s = document.createElement("div");
        s.className = "kiss";
        s.textContent = Math.random() < 0.5 ? "💋" : "😘";
        s.style.left = (r.left + r.width/2 + (Math.random()*60 - 30)) + "px";
        s.style.top  = (r.top  + r.height/2 + (Math.random()*30 - 15)) + "px";
        s.style.bottom = "auto";
        s.style.position = "fixed";
        const dur = 1.4 + Math.random() * 1.2;
        s.style.animationDuration = dur + "s";
        s.style.fontSize = (16 + Math.random() * 12) + "px";
        s.style.animationName = "floatUp";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), dur * 1000);
      }
    }

    yesBtn.addEventListener("click", () => {
      result.textContent = "Sabía que dirías que sí 😘💋";
      popMiniKisses(yesBtn);
      yesBtn.style.filter = "brightness(1.05)";
    });

    // Inicializa posición del No dentro del stage por si cambia tamaño
    function init() {
      // Coloca el "No" dentro del stage (relativo)
      stage.style.position = "relative";
      moveNoButton();
    }
    window.addEventListener("resize", init);
    init();
  </script>
</body>
</html>
